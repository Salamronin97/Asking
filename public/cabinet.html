<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cabinet | Asking Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="workspace-page">
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/"><span class="brand__mark">A</span><span>Asking Pro</span></a>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="/create" data-i18n="newSurvey">New Survey</a>
          <a class="btn btn--ghost" href="/guide" data-i18n="guide">Guide</a>
          <a class="btn btn--ghost" href="/author" data-i18n="author">Author</a>
          <select id="languageSelect" class="lang-select" aria-label="Language">
            <option value="en">EN</option>
            <option value="ru">RU</option>
            <option value="kz">KZ</option>
          </select>
          <button id="logoutBtn" class="btn btn--outline" data-i18n="logout">Logout</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container cabinet-layout">
        <aside class="cabinet-sidebar card">
          <a class="btn" href="/create" data-i18n="newSurvey">New Survey</a>
          <a class="btn btn--ghost" href="/guide" data-i18n="guide">Guide</a>
          <a class="btn btn--ghost" href="/author" data-i18n="author">Author</a>
          <div class="card plan-card">
            <strong>Asking Pro</strong>
            <p data-i18n="mySurveysLead">Create, publish, share, and analyze in one place.</p>
          </div>
        </aside>

        <section class="cabinet-main">
          <div class="section__head section__head--row">
            <div>
              <h2 data-i18n="mySurveys">My surveys</h2>
              <p data-i18n="mySurveysLead">Create, publish, share, and analyze in one place.</p>
            </div>
            <a class="btn" href="/create" data-i18n="newSurvey">New Survey</a>
          </div>
          <div id="surveyList" class="survey-list survey-list--tiles"></div>
        </section>
      </div>
    </main>

    <section class="section section--alt">
      <div class="container split">
        <form id="profileForm" class="card">
            <h3 data-i18n="profileTitle">Profile</h3>
            <div class="grid-2">
              <div class="form-row">
                <label data-i18n="fullName">Full name</label>
                <input id="profileName" name="name" type="text" minlength="2" maxlength="80" required />
              </div>
              <div class="form-row">
                <label data-i18n="accountEmail">Email</label>
                <input id="accountEmail" type="email" disabled />
              </div>
            </div>
            <div class="grid-2">
              <div class="form-row">
                <label data-i18n="company">Company</label>
                <input id="profileCompany" name="company" type="text" maxlength="120" />
              </div>
              <div class="form-row">
                <label data-i18n="position">Position</label>
                <input id="profilePosition" name="position" type="text" maxlength="120" />
              </div>
            </div>
            <div class="form-row">
              <label data-i18n="profileLanguage">Language</label>
              <select id="profileLocale" name="locale">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="kz">Қазақша</option>
              </select>
            </div>
            <p id="profileMeta" class="meta-line"></p>
            <div class="action-row">
              <button class="btn" type="submit" data-i18n="saveProfile">Save profile</button>
            </div>
            <p id="profileStatus" class="status"></p>
        </form>

        <div class="card">
          <h3 data-i18n="sessionsTitle">Sessions</h3>
          <p class="lead" data-i18n="sessionsLead">Close sessions you don't recognize.</p>
          <div id="sessionsList" class="session-list"></div>
          <div class="action-row">
            <button id="logoutAllBtn" class="btn btn--outline" type="button" data-i18n="logoutAll">Logout all devices</button>
          </div>
        </div>
      </div>
    </section>

    <div id="analysisModal" class="modal" hidden>
      <div class="modal__content">
        <button id="analysisCloseBtn" class="modal__close" type="button">x</button>
        <h3 id="analysisTitle">Survey analysis</h3>
        <div id="analysisBody"></div>
      </div>
    </div>

    <script src="/cabinet.js"></script>
  </body>
</html>
