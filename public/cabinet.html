<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cabinet | Asking</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="workspace-page cabinet-page">
    <div class="promo-bar">👉 Ваш аккаунт: Free — создавайте больше анкет и собирайте ответы.</div>

    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/"><span class="brand__mark">A</span><span>Asking</span></a>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="/guide">Гайд</a>
          <a class="btn btn--ghost" href="/author">Автор</a>
          <select id="languageSelect" class="lang-select" aria-label="Language">
            <option value="ru">RU</option>
            <option value="en">EN</option>
            <option value="kz">KZ</option>
          </select>
          <button id="logoutBtn" class="btn btn--outline">Выйти</button>
        </div>
      </div>
    </header>

    <main class="cabinet-shell">
      <aside class="cabinet-left">
        <a class="cabinet-nav is-active" href="/cabinet">Главная страница</a>
        <a class="cabinet-nav" href="/create">Новый опрос</a>
        <div class="card cabinet-plan">
          <h4>План Free</h4>
          <p>Месячный лимит ответов</p>
          <strong>0 / 50</strong>
        </div>
      </aside>

      <section class="cabinet-main">
        <div class="cabinet-main__top">
          <h1>Главная страница</h1>
          <button id="newSurveyBtn" class="btn" type="button">+ Создать анкету</button>
        </div>

        <div class="cabinet-table-wrap">
          <table class="cabinet-table">
            <thead>
              <tr>
                <th>Имя</th>
                <th>Статус</th>
                <th>Ответы</th>
                <th>Начало</th>
                <th>Окончание</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="surveyRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="createModal" class="modal" hidden>
      <div class="modal__content">
        <button id="createModalCloseBtn" class="modal__close" type="button">x</button>
        <h3>Создайте опрос</h3>
        <div class="create-modes">
          <button class="create-mode" data-mode="custom" type="button">
            <strong>Собственный опрос</strong>
            <span>Создайте новый опрос с нуля</span>
          </button>
          <button class="create-mode" data-mode="template" type="button">
            <strong>Опрос из шаблона</strong>
            <span>Выберите и адаптируйте шаблон</span>
          </button>
          <button class="create-mode" data-mode="ai" type="button">
            <strong>С помощью AI</strong>
            <span>Быстрый черновик структуры</span>
          </button>
        </div>
      </div>
    </div>

    <div id="analysisModal" class="modal" hidden>
      <div class="modal__content">
        <button id="analysisCloseBtn" class="modal__close" type="button">x</button>
        <h3 id="analysisTitle">Аналитика</h3>
        <div id="analysisBody"></div>
      </div>
    </div>

    <script src="/cabinet.js"></script>
  </body>
</html>
