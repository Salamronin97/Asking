<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder | Asking</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="workspace-page builder-page">
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/"><span class="brand__mark">A</span><span>Asking</span></a>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="/cabinet">Кабинет</a>
          <a class="btn btn--ghost" href="/guide">Гайд</a>
          <a class="btn btn--ghost" href="/author">Автор</a>
          <select id="languageSelect" class="lang-select" aria-label="Language">
            <option value="ru">RU</option>
            <option value="en">EN</option>
            <option value="kz">KZ</option>
          </select>
          <button id="logoutBtn" class="btn btn--outline">Выйти</button>
        </div>
      </div>
    </header>

    <main class="builder-shell">
      <aside class="builder-pages">
        <div class="builder-pages__head">
          <h3>Страницы анкеты</h3>
          <button id="addPageBtn" class="btn btn--ghost" type="button">+ Страница</button>
        </div>
        <div id="pagesList" class="builder-pages__list"></div>
      </aside>

      <section class="builder-canvas">
        <div class="builder-canvas__head">
          <input id="surveyTitle" class="builder-title" placeholder="Название анкеты" />
          <div class="builder-canvas__head-actions">
            <button id="openQuestionModalBtn" class="btn" type="button">+ Добавить вопрос</button>
            <button id="createSurveyBtn" class="btn btn--outline" type="button">Создать анкету</button>
          </div>
        </div>

        <div class="builder-meta">
          <input id="surveyDescription" placeholder="Описание анкеты" />
          <input id="surveyAudience" placeholder="Аудитория (например: студенты, преподаватели)" />
          <div class="builder-meta__row">
            <label>Начало <input id="startsAt" type="datetime-local" /></label>
            <label>Окончание <input id="endsAt" type="datetime-local" /></label>
            <label class="inline-check"><input id="allowMultiple" type="checkbox" /> Повторные ответы</label>
          </div>
        </div>

        <div id="questionsCanvas" class="builder-questions"></div>
        <p id="createStatus" class="status"></p>
      </section>

      <aside class="builder-settings">
        <h3>Настройки вопроса</h3>
        <div id="settingsEmpty" class="meta-line">Выберите вопрос в центре.</div>
        <div id="settingsPanel" hidden>
          <div class="form-row">
            <label>Текст вопроса</label>
            <input id="settingText" />
          </div>
          <div class="form-row">
            <label>Подпись / описание</label>
            <input id="settingHint" />
          </div>
          <div class="form-row">
            <label>Тип вопроса</label>
            <select id="settingType">
              <option value="text">Текст</option>
              <option value="single">Одиночный выбор</option>
              <option value="multi">Множественный выбор</option>
              <option value="rating">Рейтинг 1-5</option>
            </select>
          </div>
          <div class="form-row">
            <label class="inline-check"><input id="settingRequired" type="checkbox" /> Обязательный вопрос</label>
          </div>
          <div class="form-row">
            <label>Варианты (каждый с новой строки)</label>
            <textarea id="settingOptions" placeholder="Вариант 1&#10;Вариант 2"></textarea>
          </div>
          <div class="action-row">
            <button id="deleteQuestionBtn" class="btn btn--danger" type="button">Удалить вопрос</button>
          </div>
        </div>
      </aside>
    </main>

    <div id="questionModal" class="modal" hidden>
      <div class="modal__content">
        <button id="closeQuestionModalBtn" class="modal__close" type="button">x</button>
        <h3>Добавить вопрос</h3>
        <div class="form-row">
          <label>Текст вопроса</label>
          <input id="newQuestionText" />
        </div>
        <div class="form-row">
          <label>Описание (необязательно)</label>
          <input id="newQuestionHint" />
        </div>
        <div class="form-row">
          <label>Тип</label>
          <select id="newQuestionType">
            <option value="text">Текст</option>
            <option value="single">Одиночный выбор</option>
            <option value="multi">Множественный выбор</option>
            <option value="rating">Рейтинг 1-5</option>
          </select>
        </div>
        <div class="form-row">
          <label>Варианты (для выбора)</label>
          <textarea id="newQuestionOptions" placeholder="Вариант 1&#10;Вариант 2"></textarea>
        </div>
        <div class="form-row">
          <label class="inline-check"><input id="newQuestionRequired" type="checkbox" checked /> Обязательный вопрос</label>
        </div>
        <div class="action-row">
          <button id="saveQuestionBtn" class="btn" type="button">Добавить</button>
        </div>
      </div>
    </div>

    <script src="/create.js"></script>
  </body>
</html>
