<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Survey | Asking Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/"><span class="brand__mark">A</span><span>Asking Pro</span></a>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="/cabinet" data-i18n="cabinet">Cabinet</a>
          <select id="languageSelect" class="lang-select" aria-label="Language">
            <option value="en">EN</option>
            <option value="ru">RU</option>
            <option value="kz">KZ</option>
          </select>
          <button id="logoutBtn" class="btn btn--outline" data-i18n="logout">Logout</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container split">
        <form id="surveyForm" class="card">
          <h2 data-i18n="title">Create Survey Wizard</h2>

          <div class="wizard-steps" id="wizardSteps">
            <button type="button" class="wizard-step is-active" data-step-btn="1" data-i18n="step1">1. Basics</button>
            <button type="button" class="wizard-step" data-step-btn="2" data-i18n="step2">2. Questions</button>
            <button type="button" class="wizard-step" data-step-btn="3" data-i18n="step3">3. Launch</button>
          </div>

          <section data-step="1" class="wizard-pane">
            <div class="form-row">
              <label data-i18n="labelTitle">Title</label>
              <input name="title" required minlength="3" />
            </div>
            <div class="form-row">
              <label data-i18n="labelDescription">Description</label>
              <textarea name="description"></textarea>
            </div>
            <div class="form-row">
              <label data-i18n="labelAudience">Audience</label>
              <input name="audience" />
            </div>
            <div class="form-row">
              <label data-i18n="labelTemplate">Template</label>
              <select id="templateSelect"><option value="" data-i18n="selectTemplate">Select template</option></select>
            </div>
            <div id="templateCards" class="survey-list"></div>
          </section>

          <section data-step="2" class="wizard-pane" hidden>
            <div id="questions" class="questions"></div>
            <div class="action-row">
              <button type="button" id="addQuestion" class="btn btn--ghost" data-i18n="addQuestion">+ Add question</button>
            </div>
          </section>

          <section data-step="3" class="wizard-pane" hidden>
            <div class="form-row grid-2">
              <div>
                <label data-i18n="labelStartsAt">Starts at</label>
                <input type="datetime-local" name="startsAt" />
              </div>
              <div>
                <label data-i18n="labelEndsAt">Ends at</label>
                <input type="datetime-local" name="endsAt" />
              </div>
            </div>
            <div class="form-row">
              <label class="inline-check">
                <input type="checkbox" name="allowMultipleResponses" />
                <span data-i18n="allowMultiple">Allow multiple responses</span>
              </label>
            </div>
            <div class="form-row">
              <label class="inline-check">
                <input type="checkbox" name="publishImmediately" />
                <span>Publish immediately after draft creation</span>
              </label>
            </div>
            <div class="card">
              <strong data-i18n="afterDraft">After draft creation:</strong>
              <p style="margin:8px 0 0;" data-i18n="afterDraftLead">Publish in cabinet, copy public link, and share with participants.</p>
            </div>
          </section>

          <div class="action-row">
            <button type="button" id="prevStepBtn" class="btn btn--outline" data-i18n="back">Back</button>
            <button type="button" id="nextStepBtn" class="btn btn--ghost" data-i18n="next">Next</button>
            <button type="submit" id="createBtn" class="btn" hidden data-i18n="createDraft">Create draft</button>
          </div>
          <p id="status" class="status"></p>
        </form>

        <div class="card">
          <h3>Live preview</h3>
          <div class="meta">
            <span id="previewAudience">Audience: -</span>
            <span id="previewQuestions">Questions: 0</span>
          </div>
          <div class="card" style="margin-top:10px;">
            <h4 id="previewTitle" style="margin:0 0 8px;">Survey title</h4>
            <p id="previewDescription" style="margin:0;color:var(--muted);">Description preview</p>
          </div>
          <div id="previewQuestionList" class="recent-list" style="margin-top:10px;"></div>
          <a class="btn btn--outline" href="/cabinet">Open cabinet</a>
        </div>
      </div>
    </main>
    <script src="/create.js"></script>
  </body>
</html>
