<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asking | Вход и регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260315-auth-refresh" />
  </head>
  <body class="workspace-page auth-screen">
    <main class="auth-layout">
      <form id="authForm" class="card auth-card" novalidate>
        <div class="auth-card__top">
          <a class="brand" href="/"><span class="brand__mark">A</span><span>Asking</span></a>
          <select id="languageSelect" class="lang-select" aria-label="Language">
            <option value="ru">RU</option>
            <option value="en">EN</option>
            <option value="kz">KZ</option>
          </select>
        </div>

        <div class="auth-head">
          <h1 id="authTitle" data-i18n="signIn">Вход</h1>
          <p class="auth-head__lead" id="authLead" data-i18n="authLead">Используйте email и пароль.</p>
        </div>

        <div class="auth-switch" role="tablist" aria-label="Режим">
          <button type="button" class="btn auth-mode is-active" id="toLogin" data-i18n="login">Войти</button>
          <button type="button" class="btn auth-mode" id="toRegister" data-i18n="register">Регистрация</button>
          <a class="btn btn--outline" href="/" data-i18n="back">Назад</a>
        </div>

        <div class="auth-grid">
          <div class="auth-honeypot" aria-hidden="true">
            <label for="website">Website</label>
            <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
          </div>

          <div class="auth-row" id="emailRow">
            <label for="email" data-i18n="email">Email</label>
            <input id="email" type="email" required autocomplete="email" placeholder="you@mail.com" data-i18n-placeholder="emailPlaceholder" />
          </div>

          <div class="auth-row">
            <label for="password" data-i18n="password">Пароль</label>
            <div class="auth-input-wrap">
              <input id="password" type="password" required autocomplete="current-password" />
              <button id="togglePasswordBtn" class="auth-input-toggle" type="button" data-i18n="show">Показать</button>
            </div>
          </div>

          <div class="auth-row" id="confirmPasswordRow" hidden>
            <label for="confirmPassword" data-i18n="confirmPassword">Повторите пароль</label>
            <div class="auth-input-wrap">
              <input id="confirmPassword" type="password" autocomplete="new-password" />
              <button id="toggleConfirmPasswordBtn" class="auth-input-toggle" type="button" data-i18n="show">Показать</button>
            </div>
          </div>

          <div class="auth-row" id="resetTokenRow" hidden>
            <label for="resetToken" data-i18n="resetToken">Токен сброса</label>
            <input id="resetToken" type="text" autocomplete="off" />
          </div>

          <button class="btn btn--primary" id="submitBtn" type="submit" data-i18n="login">Войти</button>

          <div class="auth-aux" id="authAux">
            <button class="ghost-link" id="forgotBtn" type="button" data-i18n="forgotPassword">Забыли пароль?</button>
          </div>
        </div>

        <div class="auth-status auth-status--error" id="errorBox" role="alert" aria-live="polite"></div>
        <div class="auth-status auth-status--ok" id="okBox" aria-live="polite"></div>

        <div class="auth-panel" id="forgotPanel" hidden>
          <strong data-i18n="passwordRecovery">Восстановление пароля</strong>
          <div class="auth-row">
            <label for="forgotEmail" data-i18n="accountEmail">Email аккаунта</label>
            <input id="forgotEmail" type="email" autocomplete="email" placeholder="you@mail.com" data-i18n-placeholder="emailPlaceholder" />
          </div>
          <button class="btn btn--outline" id="forgotSendBtn" type="button" data-i18n="sendResetLink">Отправить ссылку для сброса</button>
        </div>
      </form>
    </main>

    <script src="/auth.js?v=20260315-auth-refresh"></script>
  </body>
</html>
