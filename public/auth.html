<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asking Pro | Authentication</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .auth-card {
        width: min(520px, 96vw);
        display: grid;
        gap: 14px;
      }
      .auth-head {
        display: grid;
        gap: 6px;
      }
      .auth-grid {
        display: grid;
        gap: 12px;
      }
      .auth-row {
        display: grid;
        gap: 8px;
      }
      .auth-row[hidden],
      .panel[hidden],
      .auth-aux[hidden] {
        display: none !important;
      }
      .auth-row label {
        font-weight: 600;
      }
      .auth-switch {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .auth-mode {
        background: #f1e5d8;
      }
      .auth-mode.is-active {
        background: var(--accent);
        color: #fff;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      .error {
        color: #b91c1c;
        min-height: 20px;
      }
      .ok {
        color: #166534;
        min-height: 20px;
      }
      .ghost-link {
        border: none;
        background: transparent;
        color: var(--accent-strong);
        font-weight: 700;
        padding: 0;
        text-align: left;
        cursor: pointer;
      }
      .auth-aux {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <form id="authForm" class="card auth-card">
        <div class="auth-head">
          <h2 id="authTitle">Sign In</h2>
          <p class="muted" id="authLead">Use your email and password.</p>
        </div>
        <div class="auth-switch">
          <button type="button" class="btn auth-mode is-active" id="toLogin">Login</button>
          <button type="button" class="btn auth-mode" id="toRegister">Register</button>
          <a class="btn btn--outline" href="/">Back</a>
        </div>

        <div class="auth-grid">
          <div class="sr-only">
            <label for="website">Website</label>
            <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
          </div>
          <div class="auth-row">
            <label for="email">Email</label>
            <input id="email" type="email" required autocomplete="email" placeholder="you@mail.com" />
          </div>
          <div class="auth-row">
            <label for="password">Password</label>
            <input id="password" type="password" required autocomplete="current-password" />
          </div>
          <div class="auth-row" id="resetTokenRow" hidden>
            <label for="resetToken">Reset token</label>
            <input id="resetToken" type="text" autocomplete="off" />
          </div>
          <button class="btn" id="submitBtn" type="submit">Login</button>
          <div class="auth-aux" id="authAux">
            <button class="ghost-link" id="forgotBtn" type="button">Forgot password?</button>
          </div>
        </div>

        <div class="error" id="errorBox"></div>
        <div class="ok" id="okBox"></div>

        <div class="panel" id="forgotPanel" hidden>
          <strong>Password recovery</strong>
          <div class="auth-row">
            <label for="forgotEmail">Account email</label>
            <input id="forgotEmail" type="email" autocomplete="email" placeholder="you@mail.com" />
          </div>
          <button class="btn btn--outline" id="forgotSendBtn" type="button">Send reset link</button>
        </div>
      </form>
    </div>
    <script src="/auth.js"></script>
  </body>
</html>
