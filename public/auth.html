<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asking Pro | Authentication</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .auth-card {
        width: min(560px, 96vw);
        display: grid;
        gap: 14px;
      }
      .auth-head {
        display: grid;
        gap: 6px;
      }
      .auth-grid {
        display: grid;
        gap: 12px;
      }
      .auth-row {
        display: grid;
        gap: 8px;
      }
      .auth-row label {
        font-weight: 600;
      }
      .auth-switch {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .auth-mode {
        background: #f1e5d8;
      }
      .auth-mode.is-active {
        background: var(--accent);
        color: #fff;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      .error {
        color: #b91c1c;
        min-height: 20px;
      }
      .ok {
        color: #166534;
        min-height: 20px;
      }
      .google-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff8f1;
        padding: 12px;
        display: grid;
        gap: 8px;
      }
      .google-title {
        font-weight: 700;
      }
      .google-note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      #googleWrap {
        min-height: 42px;
      }
      #googleState {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="auth-page">
      <form id="authForm" class="card auth-card">
        <div class="auth-head">
          <h2 id="authTitle">Sign In</h2>
          <p class="muted" id="authLead">Use your email and password, or continue with Google.</p>
        </div>
        <div class="auth-switch">
          <button type="button" class="btn auth-mode is-active" id="toLogin">Login</button>
          <button type="button" class="btn auth-mode" id="toRegister">Register</button>
          <a class="btn btn--outline" href="/">Back</a>
        </div>
        <div class="auth-grid">
          <div class="auth-row" id="nameRow" hidden>
            <label for="name">Name</label>
            <input id="name" type="text" autocomplete="name" />
          </div>
          <div class="auth-row">
            <label for="email">Email</label>
            <input id="email" type="email" required autocomplete="email" />
          </div>
          <div class="auth-row">
            <label for="password">Password</label>
            <input id="password" type="password" required autocomplete="current-password" />
            <span class="hint" id="passwordHint" hidden>Use at least 8 characters.</span>
          </div>
          <button class="btn" id="submitBtn" type="submit">Login</button>
        </div>
        <div class="error" id="errorBox"></div>
        <div class="ok" id="okBox"></div>
        <div class="google-card">
          <div class="google-title" id="googleTitle">Google Sign-In</div>
          <p class="google-note" id="googleLead">One-click sign in with your Google account.</p>
          <div id="googleWrap"></div>
          <p id="googleState">Checking Google OAuth configuration...</p>
        </div>
      </form>
    </div>
    <script src="/auth.js"></script>
  </body>
</html>
